<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF7EF"/>
      <stop offset="100%" stop-color="#FFEDBD"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#FAA402" stroke-width="4" opacity="0.12"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#FAA402" stroke-width="2" opacity="0.06"/>
  <!-- Sun circle -->
  <circle cx="256" cy="256" r="96" fill="#FAA402"/>
  <!-- Subtle inner highlight -->
  <circle cx="240" cy="236" r="60" fill="#FFDD80" opacity="0.3"/>
</svg>
