---
name: Deploy Web to Cloudflare

on:
  push:
    branches: [master]
    paths:
      - "web/**"
  pull_request:
    branches: [master]
    paths:
      - "web/**"

concurrency:
  group: deploy-web-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Web Artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh

      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true

      - name: Build and package static site
        run: mise exec -- just web-package VERSION=${{ github.sha }}

      - name: Upload web rollback artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sunclub-web-${{ github.sha }}
          path: |
            .build/releases/sunclub-web-${{ github.sha }}.tar.gz
            .build/releases/sunclub-web-${{ github.sha }}.tar.gz.sha256
          retention-days: 90

  deploy:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    environment: cloudflare-production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download web rollback artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sunclub-web-${{ github.sha }}
          path: .build/releases

      - name: Verify and extract web artifact
        shell: bash
        run: |
          cd .build/releases
          shasum -a 256 -c "sunclub-web-${GITHUB_SHA}.tar.gz.sha256"
          cd "${GITHUB_WORKSPACE}"
          rm -rf .build/web
          mkdir -p .build/web
          tar -xzf ".build/releases/sunclub-web-${GITHUB_SHA}.tar.gz" -C .build/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .build/web --project-name=sunclub --branch=master --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
