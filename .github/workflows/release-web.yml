---
name: Release Web

on:
  push:
    tags:
      - "web/v*.*.*"

concurrency:
  group: release-web-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Publish Web Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false

      - name: Resolve web release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#web/v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "WEB_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build and package static site
        env:
          WEB_VERSION: ${{ env.WEB_VERSION }}
        run: mise exec -- just web-package VERSION="$WEB_VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Sunclub Web ${{ env.WEB_VERSION }}
          files: |
            .build/releases/sunclub-web-${{ env.WEB_VERSION }}.tar.gz
            .build/releases/sunclub-web-${{ env.WEB_VERSION }}.tar.gz.sha256
          generate_release_notes: true
