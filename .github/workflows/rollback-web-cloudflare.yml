---
name: Rollback Web on Cloudflare

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Web release tag to redeploy, for example web/v1.2.3"
        required: true
        type: string

concurrency:
  group: rollback-web-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    name: Redeploy Web Release
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-production
      url: https://sunclub.peyton.app
    steps:
      - name: Resolve rollback release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          [[ "$RELEASE_TAG" =~ ^web/v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${RELEASE_TAG#web/v}"
          echo "WEB_RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "WEB_VERSION=$version" >> "$GITHUB_ENV"

      - name: Download web release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build/releases
          gh release download "$WEB_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir .build/releases \
            --pattern "sunclub-web-${WEB_VERSION}.tar.gz" \
            --pattern "sunclub-web-${WEB_VERSION}.tar.gz.sha256"

      - name: Verify and extract web release
        shell: bash
        run: |
          cd .build/releases
          shasum -a 256 -c "sunclub-web-${WEB_VERSION}.tar.gz.sha256"
          cd "${GITHUB_WORKSPACE}"
          rm -rf .build/web
          mkdir -p .build/web
          tar -xzf ".build/releases/sunclub-web-${WEB_VERSION}.tar.gz" -C .build/web

      - name: Deploy rollback to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .build/web --project-name=sunclub --branch=master --commit-message="Rollback to ${{ inputs.release_tag }}"
