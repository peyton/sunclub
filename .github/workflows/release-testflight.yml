---
name: Release TestFlight

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  SUNCLUB_XCODE_VERSION: "26.4"

jobs:
  release:
    name: Archive and Upload
    runs-on: macos-26
    environment: testflight
    steps:
      - name: Select Xcode 26.4
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      # Tool resolution is lockfile-enforced so CI fails fast when cached metadata is missing.

      - name: Materialize App Store Connect key
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          test -n "$ASC_KEY_ID"
          test -n "$ASC_KEY_P8"
          key_path="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "ASC_KEY_FILE=$key_path" >> "$GITHUB_ENV"

      - name: Resolve release versions
        shell: bash
        run: |
          {
            mise --locked exec -- uv run python -m scripts.tooling.resolve_versions --format github-env
            echo "SUNCLUB_FLAVOR=prod"
            echo "SUNCLUB_APS_ENVIRONMENT=production"
            echo "SUNCLUB_TUIST_SHARE=0"
          } >> "$GITHUB_ENV"

      - name: Validate App Store metadata
        run: mise --locked exec -- just appstore-validate

      - name: Run release launch safety tests
        timeout-minutes: 45
        env:
          SUNCLUB_DISABLE_SWIFT_COMPILE_CACHE: "1"
        run: mise --locked exec -- just test-unit

      - name: Archive and upload to TestFlight
        timeout-minutes: 90
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILE: ${{ env.ASC_KEY_FILE }}
          SUNCLUB_DISABLE_SWIFT_COMPILE_CACHE: "1"
        run: bash scripts/appstore/archive-and-upload.sh --allow-draft-metadata --unsigned-archive --upload-testflight

      - name: Add Internal testers group
        timeout-minutes: 60
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILE: ${{ env.ASC_KEY_FILE }}
        run: mise --locked exec -- uv run python -m scripts.appstore.testflight_groups --group Internal

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sunclub-testflight-${{ github.ref_name }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            .build/Sunclub.xcarchive
            .build/export
            .build/release-diagnostics
