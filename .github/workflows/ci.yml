---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SUNCLUB_XCODE_VERSION: "26.4"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Configure repo caches
        shell: bash
        run: |
          mkdir -p .cache/uv .cache/npm .cache/hk .cache/swiftlint .state/hk
          {
            echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/.cache/uv"
            echo "UV_PROJECT_ENVIRONMENT=$GITHUB_WORKSPACE/.venv"
            echo "HK_CACHE_DIR=$GITHUB_WORKSPACE/.cache/hk"
            echo "HK_STATE_DIR=$GITHUB_WORKSPACE/.state/hk"
            echo "npm_config_cache=$GITHUB_WORKSPACE/.cache/npm"
          } >> "$GITHUB_ENV"

      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      # Lockfile is required for all tool resolution to prevent CI drift.
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Restore repo caches
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/uv
            .cache/npm
            .cache/hk
            .cache/swiftlint
            .venv
          key: ${{ runner.os }}-sunclub-repo-${{ hashFiles('mise.lock', 'uv.lock', 'pyproject.toml', 'hk.pkl') }}
          restore-keys: |
            ${{ runner.os }}-sunclub-repo-

      - name: Run lint shard
        run: mise --locked exec -- just ci-lint

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Configure repo caches
        shell: bash
        run: |
          mkdir -p .cache/uv .cache/npm .cache/hk .cache/swiftlint .state/hk
          {
            echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/.cache/uv"
            echo "UV_PROJECT_ENVIRONMENT=$GITHUB_WORKSPACE/.venv"
            echo "HK_CACHE_DIR=$GITHUB_WORKSPACE/.cache/hk"
            echo "HK_STATE_DIR=$GITHUB_WORKSPACE/.state/hk"
            echo "npm_config_cache=$GITHUB_WORKSPACE/.cache/npm"
          } >> "$GITHUB_ENV"
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      # Lockfile is required for all tool resolution to prevent CI drift.
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Restore repo caches
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/uv
            .cache/npm
            .cache/hk
            .cache/swiftlint
            .venv
          key: ${{ runner.os }}-sunclub-repo-${{ hashFiles('mise.lock', 'uv.lock', 'pyproject.toml', 'hk.pkl') }}
          restore-keys: |
            ${{ runner.os }}-sunclub-repo-

      - name: Run Python shard
        run: mise --locked exec -- just ci-python

  test-ios-unit:
    name: iOS Unit Tests
    runs-on: macos-26
    needs: lint
    env:
      SUNCLUB_FLAVOR: prod
      TEST_APP_SCHEME: Sunclub
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Select Xcode 26.4
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Configure repo caches
        shell: bash
        run: |
          mkdir -p .cache/uv .cache/npm .cache/hk .cache/swiftlint .state/hk
          {
            echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/.cache/uv"
            echo "UV_PROJECT_ENVIRONMENT=$GITHUB_WORKSPACE/.venv"
            echo "HK_CACHE_DIR=$GITHUB_WORKSPACE/.cache/hk"
            echo "HK_STATE_DIR=$GITHUB_WORKSPACE/.state/hk"
            echo "npm_config_cache=$GITHUB_WORKSPACE/.cache/npm"
          } >> "$GITHUB_ENV"
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      # Lockfile is required for all tool resolution to prevent CI drift.
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Restore repo caches
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/uv
            .cache/npm
            .cache/hk
            .cache/swiftlint
            .venv
          key: ${{ runner.os }}-sunclub-repo-${{ hashFiles('mise.lock', 'uv.lock', 'pyproject.toml', 'hk.pkl') }}
          restore-keys: |
            ${{ runner.os }}-sunclub-repo-
      - name: Resolve build metadata
        shell: bash
        run: mise --locked exec -- uv run python -m scripts.tooling.resolve_versions --format github-env >> "$GITHUB_ENV"
      - name: Prepare Tuist cache
        timeout-minutes: 10
        run: mise --locked exec -- bash scripts/tooling/prepare_ci_workspace.sh
      - name: Run unit tests
        timeout-minutes: 45
        run: mise --locked exec -- just test-unit

  test-ios-ui:
    name: iOS UI Tests
    runs-on: macos-26
    needs: lint
    env:
      SUNCLUB_FLAVOR: prod
      TEST_APP_SCHEME: Sunclub
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Select Xcode 26.4
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Configure repo caches
        shell: bash
        run: |
          mkdir -p .cache/uv .cache/npm .cache/hk .cache/swiftlint .state/hk
          {
            echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/.cache/uv"
            echo "UV_PROJECT_ENVIRONMENT=$GITHUB_WORKSPACE/.venv"
            echo "HK_CACHE_DIR=$GITHUB_WORKSPACE/.cache/hk"
            echo "HK_STATE_DIR=$GITHUB_WORKSPACE/.state/hk"
            echo "npm_config_cache=$GITHUB_WORKSPACE/.cache/npm"
          } >> "$GITHUB_ENV"
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      # Lockfile is required for all tool resolution to prevent CI drift.
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Restore repo caches
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/uv
            .cache/npm
            .cache/hk
            .cache/swiftlint
            .venv
          key: ${{ runner.os }}-sunclub-repo-${{ hashFiles('mise.lock', 'uv.lock', 'pyproject.toml', 'hk.pkl') }}
          restore-keys: |
            ${{ runner.os }}-sunclub-repo-
      - name: Resolve build metadata
        shell: bash
        run: mise --locked exec -- uv run python -m scripts.tooling.resolve_versions --format github-env >> "$GITHUB_ENV"
      - name: Prepare Tuist cache
        timeout-minutes: 10
        run: mise --locked exec -- bash scripts/tooling/prepare_ci_workspace.sh
      - name: Run UI tests
        timeout-minutes: 45
        run: mise --locked exec -- just test-ui

  test-ios:
    name: iOS Tests
    runs-on: ubuntu-latest
    needs: [test-ios-unit, test-ios-ui]
    if: ${{ always() }}
    steps:
      - name: Validate iOS test shards
        shell: bash
        run: |
          unit_result="${{ needs.test-ios-unit.result }}"
          ui_result="${{ needs.test-ios-ui.result }}"

          printf 'iOS Unit Tests: %s\n' "$unit_result"
          printf 'iOS UI Tests: %s\n' "$ui_result"

          if [ "$unit_result" != "success" ] || [ "$ui_result" != "success" ]; then
            exit 1
          fi

  build-ios:
    name: Build iOS (${{ matrix.name }})
    runs-on: macos-26
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Development
            flavor: dev
            aps_environment: development
          - name: Production
            flavor: prod
            aps_environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Select Xcode 26.4
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Configure repo caches
        shell: bash
        run: |
          mkdir -p .cache/uv .cache/npm .cache/hk .cache/swiftlint .state/hk
          {
            echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/.cache/uv"
            echo "UV_PROJECT_ENVIRONMENT=$GITHUB_WORKSPACE/.venv"
            echo "HK_CACHE_DIR=$GITHUB_WORKSPACE/.cache/hk"
            echo "HK_STATE_DIR=$GITHUB_WORKSPACE/.state/hk"
            echo "npm_config_cache=$GITHUB_WORKSPACE/.cache/npm"
          } >> "$GITHUB_ENV"
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Restore repo caches
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/uv
            .cache/npm
            .cache/hk
            .cache/swiftlint
            .venv
          key: ${{ runner.os }}-sunclub-repo-${{ hashFiles('mise.lock', 'uv.lock', 'pyproject.toml', 'hk.pkl') }}
          restore-keys: |
            ${{ runner.os }}-sunclub-repo-
      - name: Set CI build metadata
        shell: bash
        run: |
          {
            mise --locked exec -- uv run python -m scripts.tooling.resolve_versions --format github-env
            echo "SUNCLUB_FLAVOR=${{ matrix.flavor }}"
            echo "SUNCLUB_APS_ENVIRONMENT=${{ matrix.aps_environment }}"
          } >> "$GITHUB_ENV"

          if [ "${ACT:-}" = "true" ]; then
            echo "SUNCLUB_TUIST_SHARE=0" >> "$GITHUB_ENV"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "SUNCLUB_TUIST_SHARE=0" >> "$GITHUB_ENV"
          elif [ "${{ matrix.flavor }}" != "prod" ]; then
            echo "SUNCLUB_TUIST_SHARE=0" >> "$GITHUB_ENV"
          else
            echo "SUNCLUB_TUIST_SHARE=1" >> "$GITHUB_ENV"
          fi
      - name: Prepare Tuist cache
        timeout-minutes: 10
        run: mise --locked exec -- bash scripts/tooling/prepare_ci_workspace.sh
      - name: Run iOS build shard
        timeout-minutes: 45
        run: mise --locked exec -- just ci-build

  build:
    name: Build iOS
    runs-on: ubuntu-latest
    needs: build-ios
    if: ${{ always() }}
    steps:
      - name: Validate iOS build variants
        shell: bash
        run: |
          build_result="${{ needs.build-ios.result }}"

          printf 'iOS build variants: %s\n' "$build_result"

          if [ "$build_result" != "success" ]; then
            exit 1
          fi
