---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Run lint shard
        run: mise exec -- just ci-lint

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Run Python shard
        run: mise exec -- just ci-python

  build:
    name: Build iOS
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - uses: actions/checkout@v6
      - name: Install tools
        uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Run iOS build shard
        run: mise exec -- just ci-build
