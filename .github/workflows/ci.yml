---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SUNCLUB_XCODE_VERSION: "26.4"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh

      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true

      - name: Run lint shard
        run: mise --locked exec -- just ci-lint

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true

      - name: Run Python shard
        run: mise --locked exec -- just ci-python

  test-ios-unit:
    name: iOS Unit Tests
    runs-on: macos-26
    needs: lint
    env:
      SUNCLUB_FLAVOR: dev
      SUNCLUB_DISABLE_SWIFT_COMPILE_CACHE: "1"
    steps:
      - name: Select Xcode 26.4
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Run unit tests
        timeout-minutes: 45
        run: mise --locked exec -- just test-unit

  test-ios-ui:
    name: iOS UI Tests
    runs-on: macos-26
    needs: lint
    env:
      SUNCLUB_FLAVOR: dev
      SUNCLUB_DISABLE_SWIFT_COMPILE_CACHE: "1"
    steps:
      - name: Select Xcode 26.4
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Run UI tests
        timeout-minutes: 45
        run: mise --locked exec -- just test-ui

  test-ios:
    name: iOS Tests
    runs-on: ubuntu-latest
    needs: [test-ios-unit, test-ios-ui]
    if: ${{ always() }}
    steps:
      - name: Validate iOS test shards
        shell: bash
        run: |
          unit_result="${{ needs.test-ios-unit.result }}"
          ui_result="${{ needs.test-ios-ui.result }}"

          printf 'iOS Unit Tests: %s\n' "$unit_result"
          printf 'iOS UI Tests: %s\n' "$ui_result"

          if [ "$unit_result" != "success" ] || [ "$ui_result" != "success" ]; then
            exit 1
          fi

  build:
    name: Build iOS
    runs-on: macos-26
    needs: lint
    env:
      SUNCLUB_FLAVOR: prod
      SUNCLUB_DISABLE_SWIFT_COMPILE_CACHE: "1"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Select Xcode 26.4
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ env.SUNCLUB_XCODE_VERSION }}.app/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Repair git checkout for act
        if: ${{ env.ACT }}
        run: bash scripts/tooling/repair_act_git_checkout.sh
      - name: Install tools for act
        if: ${{ env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Install tools
        if: ${{ !env.ACT }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Set CI build metadata
        shell: bash
        run: |
          mise --locked exec -- uv run python -m scripts.tooling.resolve_versions --format github-env >> "$GITHUB_ENV"

          if [ "${ACT:-}" = "true" ]; then
            echo "SUNCLUB_TUIST_SHARE=0" >> "$GITHUB_ENV"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "SUNCLUB_TUIST_SHARE=0" >> "$GITHUB_ENV"
          else
            echo "SUNCLUB_TUIST_SHARE=1" >> "$GITHUB_ENV"
          fi
      - name: Run iOS build shard
        timeout-minutes: 45
        run: mise --locked exec -- just ci-build
