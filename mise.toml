min_version = { soft = '2026.4.20' }

# CI and release workflows enforce lockfile installation with `mise --locked`.
# Keep `mise.toml` and `mise.lock` aligned whenever tool versions change.
[tools]
just = "1.50.0"
tuist = { version = "4.191.1", os = ["macos"] }
hk = "1.44.2"
actionlint = "1.7.12"
python = "3.14.4"
uv = "0.11.8"
node = "25.9.0"
"npm:prettier" = "3.8.3"
"npm:wrangler" = "4.86.0"
ruff = "0.15.12"
shellcheck = "0.11.0"
rumdl = "0.1.80"
shfmt = "3.13.1"
zizmor = "1.24.1"
swiftlint = "0.63.2"
pkl = "0.31.1"

[settings]
experimental = true
lockfile = true
